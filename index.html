<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>システム画面</title>
    <style>
        /* 
          【注意】デザインやUIは1ミリも変更していません。
          お手元の既存のCSSスタイルをそのままここに適用してください。
        */
        .color-box {
            padding: 20px;
            border: 1px solid #ccc;
            display: inline-block;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none; /* iPadでのテキスト選択防止 */
        }
    </style>
</head>
<body>

    <!-- 1. 解除ボタン（初期表記は「解除」） -->
    <button id="unlockBtn">解除</button>

    <!-- 2. ロックボタン（初期表記は「ロック」） -->
    <button id="lockBtn">ロック</button>

    <!-- 3. タップで色が変わる / 0.5秒長押しで上書きされる要素 -->
    <div id="targetElement" class="color-box">
        対象の要素（プレビュー状態）
    </div>

    <script>
        // ==========================================
        // 1. ロック / 解除の表記と挙動のトグルロジック
        // ==========================================
        
        // 【解除ボタン】
        const unlockBtn = document.getElementById('unlockBtn');
        let isUnlocked = false;

        unlockBtn.addEventListener('click', function() {
            if (!isUnlocked) {
                // ◆ 1回目のタップ：解除処理を実行
                executeUnlockProcess(); // 既存の解除関数を実行
                
                // 表記を「解除取り消し」に変更
                this.textContent = "解除取り消し";
                isUnlocked = true;
            } else {
                // ◆ 2回目のタップ：解除を取り消して元に戻す
                executeCancelUnlockProcess(); // 既存の元に戻す関数を実行
                
                // 表記を「解除」に戻す
                this.textContent = "解除";
                isUnlocked = false;
            }
        });

        // 【ロックボタン】
        const lockBtn = document.getElementById('lockBtn');
        let isLocked = false;

        lockBtn.addEventListener('click', function() {
            if (!isLocked) {
                // ◆ 1回目のタップ：ロック処理を実行
                executeLockProcess(); // 既存のロック関数を実行
                
                // 表記を「ロック取り消し」に変更
                this.textContent = "ロック取り消し";
                isLocked = true;
            } else {
                // ◆ 2回目のタップ：ロックを取り消して元に戻す
                executeCancelLockProcess(); // 既存の元に戻す関数を実行
                
                // 表記を「ロック」に戻す
                this.textContent = "ロック";
                isLocked = false;
            }
        });


        // ==========================================
        // 2. 0.5秒のロングタップで上書き保存（タップ時は色変更）
        // ==========================================
        
        const targetElement = document.getElementById('targetElement');
        let longPressTimer;
        let isLongPressActionTriggered = false;

        // 長押し開始（PCのクリック・iPadのタッチ両対応）
        function startPress(e) {
            isLongPressActionTriggered = false;
            
            // 0.5秒（500ミリ秒）押し続けたら発火
            longPressTimer = setTimeout(() => {
                isLongPressActionTriggered = true;
                
                // ◆ 0.5秒長押しで上書き保存を実行（プレビューは修正済みの状態）
                executeOverwriteSave(); 
            }, 500);
        }

        // 途中で指やマウスが離れたらタイマーをクリア
        function cancelPress(e) {
            clearTimeout(longPressTimer);
        }

        // タップ・クリック時の確定処理
        targetElement.addEventListener('click', function(e) {
            if (isLongPressActionTriggered) {
                // ロングタップ（上書き）が成立していた場合は、通常のタップ処理（色変更）を完全にブロック
                e.preventDefault();
                e.stopPropagation();
                isLongPressActionTriggered = false; // フラグをリセット
                return;
            }
            
            // ◆ 通常のタップ：色が変わる処理（既存の処理をそのまま維持）
            executeColorChangeProcess(this);
        });

        // 長押し判定のためのイベントリスナー登録（既存の要素にそのまま紐付けてください）
        targetElement.addEventListener('mousedown', startPress);
        targetElement.addEventListener('touchstart', startPress, { passive: true });
        targetElement.addEventListener('mouseup', cancelPress);
        targetElement.addEventListener('touchend', cancelPress);
        targetElement.addEventListener('mouseleave', cancelPress);


        // ==========================================
        // 既存のシステム関数（元々お手元にある処理の受け皿）
        // ==========================================
        function executeUnlockProcess() {
            console.log("解除が実行されました");
        }
        function executeCancelUnlockProcess() {
            console.log("解除が取り消されました（元に戻る）");
        }
        function executeLockProcess() {
            console.log("ロックが実行されました");
        }
        function executeCancelLockProcess() {
            console.log("ロックが取り消されました（元に戻る）");
        }
        function executeOverwriteSave() {
            console.log("0.5秒長押し：上書き保存が実行されました（プレビューは修正済みの状態）");
            alert("上書き保存しました");
        }
        function executeColorChangeProcess(element) {
            console.log("通常タップ：色変更処理を実行");
            // 例：element.style.backgroundColor = "lightblue"; などの既存ロジック
        }
    </script>

</body>
</html>
