<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Preview — 2人で作るカラーパレット</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--surface:#f5f5f7;--surface2:#ebebef;--border:#e0e0e8;
  --text:#1a1a2e;--muted:#9999aa;--radius:12px;--radius-sm:8px;
  --accent:#3b7960;--accent-light:#f0faf5;--accent-border:#c3e8d8;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:24px 16px;line-height:1.5}
.app{max-width:900px;margin:0 auto}

header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}

/* Main Preview */
.preview-card{
  background:var(--surface);border-radius:var(--radius);padding:40px 24px;
  text-align:center;margin-bottom:24px;transition:all 0.3s ease;
  border:1px solid var(--border);position:relative;overflow:hidden;
}
#sampleText{font-size:32px;font-weight:700;margin-bottom:8px;word-break:break-all}
#sampleSub{font-size:14px;opacity:0.8}
.ratio-badge{
  position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.1);
  padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
}

/* Controls */
.controls{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.control-item{display:flex;flex-direction:column;gap:8px}
label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.input-group{display:flex;gap:8px;align-items:center}
input[type="color"]{
  -webkit-appearance:none;border:none;width:40px;height:40px;cursor:pointer;
  background:none;border-radius:50%;overflow:hidden;
}
input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:50%}
input[type="text"]{
  flex:1;background:var(--surface);border:1px solid var(--border);
  padding:8px 12px;border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:14px;
}

/* Actions */
.actions{display:flex;gap:12px;margin-bottom:40px}
button{
  flex:1;padding:12px;border-radius:var(--radius);border:none;cursor:pointer;
  font-family:inherit;font-weight:600;font-size:14px;transition:all 0.2s;
}
button.primary{background:var(--text);color:white}
button.secondary{background:var(--surface2);color:var(--text)}
button:active{transform:scale(0.98)}

/* Groups & Swatches */
.group-section{margin-bottom:32px}
.group-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px;
}
.group-header span{font-weight:700;font-size:16px}
.group-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.row-key{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  background:var(--surface);border-radius:var(--radius-sm);font-size:20px;flex-shrink:0;
}
.swatch-list{display:flex;flex-wrap:wrap;gap:10px}
.swatch-chip{
  padding:10px 18px;border-radius:var(--radius-sm);cursor:pointer;
  position:relative;min-width:60px;text-align:center;font-weight:600;
  border:1px solid rgba(0,0,0,0.05);transition:transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.swatch-chip.is-locked{ border: 2px solid gold; box-shadow: 0 0 5px rgba(255,215,0,0.5); }
.swatch-chip span{ pointer-events: none; }

/* Chip Buttons */
.swatch-chip-del, .move-btn {
  position:absolute; background:rgba(255,255,255,0.9); color:#000;
  font-size:10px; border-radius:4px; display:flex; align-items:center; justify-content:center;
  border: 1px solid #ccc;
}
.swatch-chip-del { top:-6px; right:-6px; width:18px; height:18px; }
.move-btn { bottom:-6px; width:18px; height:18px; }
.move-btn.prev { left: 4px; }
.move-btn.next { right: 4px; }

/* Modal */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);
  display:none;align-items:center;justify-content:center;padding:20px;z-index:100;
}
.modal{
  background:var(--bg);width:100%;max-width:400px;border-radius:var(--radius);
  padding:24px;box-shadow:0 20px 40px rgba(0,0,0,0.2);
}
.modal h2{margin-bottom:20px;font-size:18px}
.modal select, .modal input{
  width:100%;padding:12px;margin-bottom:16px;border-radius:var(--radius-sm);
  border:1px solid var(--border);font-family:inherit;
}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.emoji-item{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:8px;background:var(--surface);font-size:20px;
}
.emoji-item.selected{outline:2px solid var(--text);background:var(--surface2)}

/* Sync UI */
.sync-panel{
  background:var(--accent-light);border:1px solid var(--accent-border);
  border-radius:var(--radius);padding:16px;margin-bottom:32px;display:none;
}
.sync-panel h3{font-size:14px;margin-bottom:12px;color:var(--accent)}
.sync-panel input{
  width:100%;background:white;border:1px solid var(--accent-border);
  padding:8px;border-radius:6px;margin-bottom:8px;font-size:12px;
}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.8);color:white;padding:8px 20px;
  border-radius:20px;font-size:13px;display:none;z-index:1000;
}
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Color Preview</h1>
    <button id="syncBtn" class="secondary" style="flex:none;padding:6px 12px;font-size:12px">Sync 設定</button>
  </header>

  <div id="syncPanel" class="sync-panel">
    <h3>GitHub Gist 同期</h3>
    <input type="password" id="gistTokenInput" placeholder="GitHub Token (gist scope)">
    <input type="text" id="gistIdInput" placeholder="Gist ID (空欄で新規作成)">
    <div style="display:flex;gap:8px">
      <button onclick="connectGist()" class="primary" style="padding:8px;font-size:12px">接続 / 作成</button>
      <button onclick="disconnectGist()" class="secondary" style="padding:8px;font-size:12px">切断</button>
    </div>
    <p id="syncNote" style="font-size:10px;margin-top:8px;color:var(--muted)"></p>
  </div>

  <div class="preview-card" id="previewCard">
    <div id="sampleText">Color Sample</div>
    <div id="sampleSub">背景色と文字色の組み合わせ</div>
    <div class="ratio-badge" id="ratioBadge">Ratio: 21.00</div>
  </div>

  <div class="controls">
    <div class="control-item">
      <label>Text Color</label>
      <div class="input-group">
        <input type="color" id="tColor" value="#1a1a2e">
        <input type="text" id="tHex" value="#1a1a2e" maxlength="7">
      </div>
    </div>
    <div class="control-item">
      <label>Background</label>
      <div class="input-group">
        <input type="color" id="bColor" value="#ffffff">
        <input type="text" id="bHex" value="#ffffff" maxlength="7">
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="openAddModal()">現在の色を登録</button>
  </div>

  <div id="groupsContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>パレットに登録</h2>
    <label>グループ選択</label>
    <select id="modalGroup"></select>
    
    <label>行の絵文字を選択</label>
    <div class="emoji-grid" id="emojiGrid"></div>
    <input type="text" id="emojiNewInput" placeholder="新しい絵文字を入力" maxlength="2">
    
    <div style="display:flex;gap:12px;margin-top:12px">
      <button class="secondary" onclick="closeModal()">キャンセル</button>
      <button class="primary" onclick="confirmAdd()">登録する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// Data & State
// ─────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);

// ご指定の並び順に変更したデフォルトグループ
const DEFAULT_GROUPS = [
  {
    name: 'Group 1',
    rows: [
      { key: '🌃', colors: [] },
      { key: '👓', colors: [] },
      { key: '🐹', colors: [] },
      { key: '🥽', colors: [] },
      { key: '🕶️', colors: [] },
      { key: '🐸', colors: [] },
      { key: '🩰', colors: [] }
    ]
  },
  {
    name: 'Group 2',
    rows: [
      { key: '🌆', colors: [] },
      { key: '🦍', colors: [] },
      { key: '🐱', colors: [] },
      { key: '🐰', colors: [] },
      { key: '🦊', colors: [] },
      { key: '🧪', colors: [] },
      { key: '🎀', colors: [] }
    ]
  }
];

let groups = JSON.parse(localStorage.getItem('cp_groups5')) || DEFAULT_GROUPS;
let syncConfig = { token: '', gistId: '' };
let selectedEmojiKey = '';

// ─────────────────────────────────────────────
// Core Logic
// ─────────────────────────────────────────────
function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? [
    parseInt(result[1], 16),
    parseInt(result[2], 16),
    parseInt(result[3], 16)
  ] : [0,0,0];
}

function getLuminance(r, g, b) {
  const a = [r, g, b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
}

function getContrast(hex1, hex2) {
  const l1 = getLuminance(...hexToRgb(hex1));
  const l2 = getLuminance(...hexToRgb(hex2));
  return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
}

function render() {
  const t = document.getElementById('tHex').value;
  const b = document.getElementById('bHex').value;
  const card = document.getElementById('previewCard');
  const ratio = document.getElementById('ratioBadge');
  
  card.style.backgroundColor = b;
  card.style.color = t;
  
  const contrast = getContrast(t, b);
  ratio.textContent = `Ratio: ${contrast.toFixed(2)}`;
}

function applyHex(type, hex) {
  document.getElementById(type + 'Color').value = hex;
  document.getElementById(type + 'Hex').value = hex;
  render();
}

function applyPreset(t, b) {
  applyHex('t', t);
  applyHex('b', b);
  showToast('パレットを適用しました');
}

// ─────────────────────────────────────────────
// Groups & Swatches
// ─────────────────────────────────────────────
function saveGroups() {
  localStorage.setItem('cp_groups5', JSON.stringify(groups));
  syncPush();
}

function renderGroups() {
  const container = document.getElementById('groupsContainer');
  container.innerHTML = '';

  groups.forEach((g, gi) => {
    const gEl = document.createElement('div');
    gEl.className = 'group-section';
    gEl.innerHTML = `<div class="group-header"><span>${g.name}</span></div>`;

    g.rows.forEach((row, ri) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'group-row';
      rowEl.innerHTML = `<div class="row-key">${row.key}</div>`;

      const list = document.createElement('div');
      list.className = 'swatch-list';

      row.colors.forEach((c, ci) => {
        const chip = document.createElement('div');
        chip.className = 'swatch-chip';
        chip.style.backgroundColor = c.b; 
        chip.style.color = c.t;
        chip.innerHTML = `<span>Aa</span>`;
        if (c.locked) chip.classList.add('is-locked');

        // タップで適用
        chip.onclick = () => applyPreset(c.t, c.b);

        // 前へボタン
        const mPrev = document.createElement('div');
        mPrev.className = 'move-btn prev';
        mPrev.textContent = '◀';
        mPrev.onclick = (e) => { e.stopPropagation(); moveColor(gi, ri, ci, -1); };

        // 次へボタン
        const mNext = document.createElement('div');
        mNext.className = 'move-btn next';
        mNext.textContent = '▶';
        mNext.onclick = (e) => { e.stopPropagation(); moveColor(gi, ri, ci, 1); };

        // 削除/ロックボタン
        const del = document.createElement('div');
        del.className = 'swatch-chip-del';
        del.textContent = c.locked ? '🔒' : '×';
        del.onclick = (e) => {
          e.stopPropagation();
          if (c.locked) {
            if(!confirm('この色はロックされています。ロックを解除して削除しますか？')) return;
          }
          row.colors.splice(ci, 1);
          if (row.colors.length === 0) g.rows.splice(ri, 1);
          saveGroups(); renderGroups();
        };

        // 長押しでロック（iPad対応）
        chip.oncontextmenu = (e) => {
          e.preventDefault();
          c.locked = !c.locked;
          saveGroups(); renderGroups();
          showToast(c.locked ? '色をロックしました' : 'ロックを解除しました');
        };

        chip.appendChild(mPrev);
        chip.appendChild(mNext);
        chip.appendChild(del);
        list.appendChild(chip);
      });
      rowEl.appendChild(list);
      gEl.appendChild(rowEl);
    });
    container.appendChild(gEl);
  });
}

// 並べ替えロジック
function moveColor(gi, ri, ci, dir) {
  const colors = groups[gi].rows[ri].colors;
  const target = ci + dir;
  if (target < 0 || target >= colors.length) return;
  const temp = colors[ci];
  colors[ci] = colors[target];
  colors[target] = temp;
  saveGroups();
  renderGroups();
}

// ─────────────────────────────────────────────
// Modal
// ─────────────────────────────────────────────
function openAddModal() {
  const select = document.getElementById('modalGroup');
  select.innerHTML = groups.map((g, i) => `<option value="${i}">${g.name}</option>`).join('');
  
  updateEmojiGrid(0);
  document.getElementById('modalOverlay').style.display = 'flex';
}

function updateEmojiGrid(groupIndex) {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  const uniqueKeys = [...new Set(groups[groupIndex].rows.map(r => r.key))];
  
  uniqueKeys.forEach(key => {
    const item = document.createElement('div');
    item.className = 'emoji-item' + (selectedEmojiKey === key ? ' selected' : '');
    item.textContent = key;
    item.onclick = () => {
      selectedEmojiKey = key;
      updateEmojiGrid(groupIndex);
    };
    grid.appendChild(item);
  });

  const newItem = document.createElement('div');
  newItem.className = 'emoji-item' + (selectedEmojiKey === '__new__' ? ' selected' : '');
  newItem.textContent = '＋';
  newItem.onclick = () => {
    selectedEmojiKey = '__new__';
    updateEmojiGrid(groupIndex);
  };
  grid.appendChild(newItem);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  selectedEmojiKey = '';
}

function confirmAdd() {
  const t = document.getElementById('tHex').value;
  const b = document.getElementById('bHex').value;
  const gi = +document.getElementById('modalGroup').value;
  const g = groups[gi];
  
  let key = selectedEmojiKey;
  if (key === '__new__' || !key) {
    key = document.getElementById('emojiNewInput').value.trim() || '⭐';
  }

  let row = g.rows.find(r => r.key === key);
  if (!row) {
    row = { key, colors: [] };
    g.rows.push(row);
  }

  // 背景(b)と文字(t)のセットで登録！
  row.colors.push({
    id: uid(),
    t: t,
    b: b,
    locked: false
  });

  saveGroups();
  renderGroups();
  closeModal();
  showToast('パレットに登録しました');
}

// ─────────────────────────────────────────────
// Sync & Gist (Free Tier)
// ─────────────────────────────────────────────
function loadSyncConfig() {
  const saved = localStorage.getItem('cp_sync_v2');
  if (saved) syncConfig = JSON.parse(saved);
}

async function connectGist() {
  const token = document.getElementById('gistTokenInput').value.trim();
  const gistId = document.getElementById('gistIdInput').value.trim();
  if (!token) return alert('Tokenが必要です');

  syncConfig.token = token;
  const body = {
    description: "Color Preview Data",
    public: false,
    files: { "colors.json": { content: JSON.stringify(groups) } }
  };

  try {
    const method = gistId ? 'PATCH' : 'POST';
    const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
    
    const res = await fetch(url, {
      method,
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    
    if (!res.ok) throw new Error('接続に失敗しました');
    const data = await res.json();
    
    syncConfig.gistId = data.id;
    localStorage.setItem('cp_sync_v2', JSON.stringify(syncConfig));
    document.getElementById('gistIdInput').value = data.id;
    
    if (gistId) {
      const remoteData = JSON.parse(data.files["colors.json"].content);
      groups = remoteData;
      renderGroups();
      showToast('同期完了：データを読み込みました');
    } else {
      showToast('新規Gistを作成しました');
    }
  } catch (err) {
    alert(err.message);
  }
}

async function syncPush() {
  if (!syncConfig.token || !syncConfig.gistId) return;
  try {
    await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${syncConfig.token}` },
      body: JSON.stringify({
        files: { "colors.json": { content: JSON.stringify(groups) } }
      })
    });
    console.log('Gist pushed');
  } catch (err) {
    console.error('Sync failed', err);
  }
}

function disconnectGist() {
  if (confirm('同期設定を解除しますか？(データはブラウザに残ります)')) {
    syncConfig = { token: '', gistId: '' };
    localStorage.removeItem('cp_sync_v2');
    document.getElementById('gistTokenInput').value = '';
    document.getElementById('gistIdInput').value = '';
    showToast('同期を解除しました');
  }
}

// ─────────────────────────────────────────────
// UI Helpers
// ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// ─────────────────────────────────────────────
// Listeners
// ─────────────────────────────────────────────
document.getElementById('tColor').addEventListener('input', e => applyHex('t', e.target.value));
document.getElementById('bColor').addEventListener('input', e => applyHex('b', e.target.value));
document.getElementById('tHex').addEventListener('input', e => {
  if (/^#[0-9A-F]{6}$/i.test(e.target.value)) applyHex('t', e.target.value);
});
document.getElementById('bHex').addEventListener('input', e => {
  if (/^#[0-9A-F]{6}$/i.test(e.target.value)) applyHex('b', e.target.value);
});

document.getElementById('syncBtn').addEventListener('click', () => {
  const panel = document.getElementById('syncPanel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
});

document.getElementById('modalGroup').addEventListener('change', e => updateEmojiGrid(e.target.value));

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
(function init(){
  const params = new URLSearchParams(location.search);
  const urlGistId = params.get('gist');
  loadSyncConfig();
  
  if (urlGistId && urlGistId !== syncConfig.gistId) {
    syncConfig.gistId = urlGistId;
    document.getElementById('gistIdInput').value = urlGistId;
    document.getElementById('syncPanel').style.display = 'block';
  } else if (syncConfig.token && syncConfig.gistId) {
    document.getElementById('gistTokenInput').value = syncConfig.token;
    document.getElementById('gistIdInput').value = syncConfig.gistId;
  }
  
  render();
  renderGroups();
})();

</script>
</body>
</html>
