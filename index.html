<!DOCTYPE html>
<meta name="robots" content="noindex,nofollow">
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Preview — 文字色 × 背景色チェッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--surface:#f5f5f7;--surface2:#ebebef;--border:#e0e0e8;
  --text:#1a1a2e;--muted:#9999aa;--radius:12px;--radius-sm:8px;
  --accent:#3b7960;--accent-light:#f0faf5;--accent-border:#c3e8d8;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:24px 16px;line-height:1.5}
.app{max-width:900px;margin:0 auto}

header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
h1{font-size:19px;font-weight:700;letter-spacing:-.02em}
h1 span{color:var(--muted);font-weight:400;font-size:13px;margin-left:6px}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .3s;cursor:pointer;user-select:none}
.sync-badge:hover{border-color:#bbb}
.sync-badge.synced{background:var(--accent-light);border-color:var(--accent-border);color:var(--accent)}
.sync-badge.syncing{background:#fffbe6;border-color:#ffe58f;color:#b8860b}
.sync-badge.error{background:#fff2f0;border-color:#ffccc7;color:#cf1322}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.sync-gear{font-size:9px;opacity:.55;flex-shrink:0}

.swap-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:background .15s}
.swap-btn:hover{background:var(--surface2)}
.swap-btn svg{flex-shrink:0;transition:transform .3s}
.swap-btn:hover svg{transform:rotate(180deg)}

.panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.panels{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

.swatch-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.swatch{width:44px;height:44px;border-radius:50%;border:2px solid rgba(0,0,0,.07);flex-shrink:0;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:transform .15s,box-shadow .15s}
.swatch:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(0,0,0,.18)}
.swatch input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);opacity:0;cursor:pointer}
.hex-wrap{flex:1;min-width:0}
.hex-label{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:3px}

.hex-copy-row{display:flex;align-items:center;gap:4px}
.hex-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;font-weight:500;padding:5px 8px;outline:none;transition:border-color .15s}
.hex-input:focus{border-color:#999}
.copy-hex-btn{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-size:10px;padding:5px 7px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
.copy-hex-btn:hover{background:var(--text);color:#fff;border-color:var(--text)}
.copy-hex-btn.copied{background:var(--accent);color:#fff;border-color:var(--accent)}

.name-input{width:100%;background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:12px;padding:3px 2px;outline:none;margin-bottom:8px;transition:border-color .15s}
.name-input::placeholder{color:var(--muted)}
.name-input:focus{border-bottom-color:#aaa}

.sliders{display:flex;flex-direction:column;gap:6px}
.slider-group{display:flex;align-items:center;gap:8px}
.slider-name">H</div><input type="range" id="tH" min="0" max="359" value="229" style="background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)"><span class="slider-val" id="tHval">229°</span></div>
        <div class="slider-group"><span class="slider-name">S</span><input type="range" id="tS" min="0" max="100" value="44"><span class="slider-val" id="tSval">44%</span></div>
        <div class="slider-group"><span class="slider-name">V</span><input type="range" id="tV" min="0" max="100" value="18"><span class="slider-val" id="tVval">18%</span></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">背景色</div>
      <div class="swatch-row">
        <div class="swatch" id="bSwatch"><input type="color" id="bPicker" value="#e8f4f8"></div>
        <div class="hex-wrap">
          <div class="hex-label">HEX</div>
          <div class="hex-copy-row">
            <input type="text" class="hex-input" id="bHex" value="#e8f4f8" maxlength="7" spellcheck="false">
            <button class="copy-hex-btn" id="copyBBtn" onclick="copyHex('b')">コピー</button>
          </div>
        </div>
      </div>
      <input type="text" class="name-input" id="bName" placeholder="色の名前（任意）" maxlength="30">
      <div class="sliders">
        <div class="slider-group"><span class="slider-name">H</span><input type="range" id="bH" min="0" max="359" value="200" style="background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)"><span class="slider-val" id="bHval">200°</span></div>
        <div class="slider-group"><span class="slider-name">S</span><input type="range" id="bS" min="0" max="100" value="38"><span class="slider-val" id="bSval">38%</span></div>
        <div class="slider-group"><span class="slider-name">V</span><input type="range" id="bV" min="0" max="100" value="97"><span class="slider-val" id="bVval">97%</span></div>
      </div>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="preview-hint">クリックして文字を編集できます</div>
    <div class="preview-box" id="preview">
      <div class="preview-large" contenteditable="true" spellcheck="false">あAaBbCc 123</div>
      <div class="preview-body" contenteditable="true" spellcheck="false">日本語と English が混在したサンプルテキストです。<br>This is a sample text for color preview.</div>
      <div class="preview-small" contenteditable="true" spellcheck="false">小さい文字サイズでの見やすさもチェックできます。Small text visibility check.</div>
    </div>
    <div class="preview-bar">
      <div class="color-codes">
        <div class="code-chip" onclick="copyAndShowHex('t')" title="タップでコピー">
          <div class="chip-dot" id="tcDot"></div>
          <span class="code-label">文字</span>
          <span class="chip-code" id="tcCode">#1A1A2E</span>
          <span class="chip-name" id="tcName"></span>
          <span class="chip-copy-hint">copy</span>
        </div>
        <div class="code-chip-sep"></div>
        <div class="code-chip code-chip-rev" onclick="copyAndShowHex('b')" title="タップでコピー">
          <span class="chip-copy-hint">copy</span>
          <span class="chip-name" id="bcName"></span>
          <span class="chip-code" id="bcCode">#E8F4F8</span>
          <span class="code-label">背景</span>
          <div class="chip-dot" id="bcDot"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="presets-section">
    <div class="presets-header">
      <span class="section-label">プリセット</span>
      <div class="preset-actions">
        <button class="icon-btn" id="lockModeBtn" onclick="toggleLockMode()" title="ロック/解除する色を選択">
          <span id="lockModeIcon">🔓</span> <span id="lockModeText">ロック選択</span>
        </button>
        <button class="icon-btn" id="editModeBtn" onclick="toggleEditMode()" title="行キーやカラーを編集・削除・並び替え">
          <span>✏️</span> <span>編集</span>
        </button>
        <button class="icon-btn" onclick="openAddModal()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          登録
        </button>
        <button class="icon-btn" onclick="openAddGroupModal()">＋ グループ</button>
      </div>
    </div>
    <div class="groups-list" id="groupsList"></div>
  </div>

  <div class="sync-setup" id="syncSetup" style="display:none;">
    <div class="sync-setup-title">🔗 プリセット同期設定（GitHub Gist使用）</div>
    <div class="sync-row">
      <input type="text" class="sync-input" id="gistTokenInput" placeholder="GitHub Personal Access Token (gist権限)" autocomplete="off">
      <input type="text" class="sync-input" id="gistIdInput" placeholder="Gist ID（2人目は相手から受け取る）" style="max-width:220px">
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <button class="sync-action-btn primary" onclick="setupSync()">接続 / 作成</button>
      <button class="sync-action-btn secondary" onclick="clearSync()">切断</button>
    </div>
    <div class="sync-note" id="syncNote">
      <a href="https://github.com/settings/tokens/new?scopes=gist&description=ColorPreview" target="_blank">① GitHubでgistスコープのトークンを作成</a> → ② 1人目が「接続/作成」→ 共有URLをコピーして相手に送る </div>
    <div class="sync-share-url" id="syncShareUrlRow" style="display:none">
      <input type="text" class="sync-share-input" id="syncShareInput" readonly>
      <button class="sync-copy-btn" onclick="copySyncUrl()">URLコピー</button>
    </div>
  </div>
  <footer>チップをタップ → プレビュー反映 ＋ コードコピー ／ 編集モードで位置入れ替え</footer>
</div>
<div class="copy-toast" id="copyToast"></div>

<style>
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
/* すべてのポップアップを上書きモーダルのデザイン（横幅300px・中央揃え）に統一 */
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px;width:300px !important;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;text-align:center}
.modal-field{margin-bottom:12px;text-align:center}
.modal-label{font-size:11px;color:var(--muted);letter-spacing:.05em;margin-bottom:5px;text-align:center}
.modal-input,.group-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;text-align:center}
.modal-input:focus,.group-select:focus{border-color:#999}
.modal-btns{display:flex;gap:8px;justify-content:center;margin-top:16px}
.modal-btn{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);transition:all .15s}
.modal-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.modal-btn.primary:hover{opacity:.85}
.modal-btn.secondary{background:none;color:var(--muted)}
.modal-btn.secondary:hover{color:var(--text)}

/* 色登録モーダル内の個別要素調整 */
.modal-preview{display:flex;align-items:center;justify-content:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:14px}
.modal-preview-swatches{display:flex;gap:6px;flex-shrink:0}
/* ★ カラー編集画面の楕円を綺麗な◯円に修正 */
.modal-preview-dot{width:24px;height:24px;border-radius:50% !important;border:1.5px solid rgba(0,0,0,0.15);box-shadow:0 1px 4px rgba(0,0,0,0.1);aspect-ratio:1/1;flex-shrink:0}
.modal-preview-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.7;text-align:left}
.emoji-key-select{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;justify-content:center}
.emoji-key-btn{font-size:18px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;background:var(--surface);transition:all .12s;line-height:1}
.emoji-key-btn:hover{background:var(--surface2)}
.emoji-key-btn.selected{border-color:var(--text);background:var(--surface2)}

/* 上書き確認モーダル用 */
.overwrite-compare{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;background:#d0d0d8;border:none;border-radius:var(--radius);padding:20px 16px}
.overwrite-side{display:flex;flex-direction:column;align-items:center;gap:7px}
.overwrite-side-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.85)}
.overwrite-chip-preview{width:56px;height:56px;border-radius:50%;border:2.5px solid #ffffff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;box-shadow:0 0 0 1px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.2)}
.overwrite-chip-preview.locked-preview{border-radius:10px}
.overwrite-arrow{font-size:18px;color:rgba(255,255,255,0.7);flex-shrink:0;line-height:1;margin-top:18px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   グループ一覧レイアウト＆ヘッダー中央揃え＆編集モード
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.groups-list{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));gap:12px}
@media(min-width:768px){
  .groups-list{grid-template-columns:repeat(3, 1fr)}
  /* ★ グループが1つの時は1枚、2つの時は綺麗に2分割（寄せない） */
  .groups-list:has(> :nth-child(1):last-child){grid-template-columns:1fr}
  .groups-list:has(> :nth-child(2):last-child){grid-template-columns:repeat(2, 1fr)}
}
.group-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:outline .15s}
/* ★ ドロップ先を緑ではなく「濃いグレー」の点線に変更 */
.group-block.drag-over{outline:2px dashed #555566 !important;outline-offset:2px}
.group-block.dragging{opacity:.4}

/* ★ グループ名の中央揃えを完全に保証するための絶対配置構造 */
.group-header{position:relative;display:flex;align-items:center;justify-content:center;padding:7px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}
.group-name-input{background:transparent;border:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text);outline:none;text-align:center;width:60%}

/* ★ ハンドルと削除ボタン：通常時は非表示、編集モード時のみ表示 */
.group-drag-handle{position:absolute;left:12px;color:var(--muted);font-size:13px;user-select:none;display:none}
.group-del-btn{position:absolute;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;display:none}
.group-del-btn:hover{color:#cc4444}

body.mode-edit .group-drag-handle{display:block;cursor:grab}
body.mode-edit .group-drag-handle:active{cursor:grabbing}
body.mode-edit .group-del-btn{display:block}

/* その他既存パーツ */
.emoji-rows{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.emoji-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:nowrap}
.emoji-key{font-size:15px;flex-shrink:0;min-width:28px;text-align:center;padding:2px 4px;border-radius:4px;border:1px solid transparent;line-height:32px;transition:all .15s}
body.mode-edit .emoji-key{border:1.5px dashed var(--muted);cursor:pointer}
body.mode-edit .emoji-key:hover{border-color:var(--text);background:var(--surface2)}
.emoji-swatches{display:flex;gap:4px;flex-wrap:wrap;align-items:flex-start;flex:1;min-width:0}

/* チップ */
.swatch-chip{position:relative;width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(0,0,0,.08);cursor:pointer;flex-shrink:0;transition:transform .15s,box-shadow .15s}
.swatch-chip:hover{transform:scale(1.12);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.swatch-chip.active-chip{border-color:var(--text);box-shadow:0 0 0 2px var(--text)}
.swatch-chip.selected-chip{border-color:#fff !important;box-shadow:0 0 0 2px #fff,0 0 0 4.5px rgba(255,255,255,.45) !important;transform:scale(1.1)}
.swatch-chip.selected-chip::after{content:'';position:absolute;inset:-5px;border-radius:10px;border:2px solid #1a1a2e;opacity:0;animation:chip-pulse 1.8s ease-in-out infinite;pointer-events:none}
@keyframes chip-pulse{0%{opacity:.5;transform:scale(1)}60%{opacity:0;transform:scale(1.35)}100%{opacity:0;transform:scale(1.35)}}
.swatch-chip-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',sans-serif;font-weight:600;letter-spacing:-.01em;user-select:none;border-radius:50%;overflow:hidden;text-align:center;line-height:1.2;padding:2px 1px 3px}
.swatch-chip.locked{border-radius:5px !important}
.swatch-chip.locked .swatch-chip-inner{border-radius:3px}
.swatch-chip.selected-for-swap{border-color:#fff !important;box-shadow:0 0 0 2px #fff,0 0 0 4.5px rgba(255,255,255,.45) !important;transform:scale(1.1)}
.swatch-chip-tooltip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-family:'DM Mono',monospace;font-size:9px;padding:3px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10}
.swatch-chip:hover .swatch-chip-tooltip{opacity:1}

.chip-edit-btn{display:none;position:absolute;bottom:-5px;right:-5px;width:16px;height:16px;background:#fff;color:#555;border:none;border-radius:50%;font-size:9px;cursor:pointer;align-items:center;justify-content:center;z-index:5;padding:0;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:transform .12s}
.chip-edit-btn:hover{transform:scale(1.15)}
body.mode-edit .chip-edit-btn{display:flex}

.row-reorder-btns{display:none;flex-direction:column;gap:1px;flex-shrink:0;margin-top:8px}
.row-reorder-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:8px;width:16px;height:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.row-reorder-btn:hover{background:var(--surface2);color:var(--text)}
.row-reorder-btn:disabled{opacity:.25;cursor:default}
body.mode-edit .row-reorder-btns{display:flex}

body.mode-lock .swatch-chip.selected-for-lock-on{border-color:#d9363e;box-shadow:0 0 0 3px rgba(217,54,62,.3);transform:scale(1.05)}
body.mode-lock .swatch-chip.selected-for-lock-off{border-color:#3b7960;box-shadow:0 0 0 3px rgba(59,121,96,.3);transform:scale(1.05)}

.emoji-add-btn{width:32px;height:32px;border-radius:6px;border:1.5px dashed var(--border);background:none;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1}
.emoji-add-btn:hover{border-color:#aaa;color:var(--text);background:var(--surface2)}
.group-add-row{padding:6px 12px;border-top:1px solid var(--border)}
.group-add-preset{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;color:var(--muted);cursor:pointer;background:none;border:none;width:100%;transition:color .15s;padding:0;justify-content:center}
.group-add-preset:hover{color:var(--text)}

footer{text-align:center;font-size:10px;color:var(--muted);padding-top:12px}
</style>

<div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>現在の色を登録</h3>
    <div class="modal-preview">
      <div class="modal-preview-swatches">
        <div class="modal-preview-dot" id="modalDotT"></div>
        <div class="modal-preview-dot" id="modalDotB"></div>
      </div>
      <div class="modal-preview-info" id="modalInfo"></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">グループ</div>
      <select class="group-select" id="modalGroup" onchange="onModalGroupChange()"></select>
    </div>
    <div class="modal-field">
      <div class="modal-label">行(キー)を選択</div>
      <div class="emoji-key-select" id="emojiKeySelect"></div>
    </div>
    <div class="modal-field">
      <div class="modal-label">チップの表示文字（任意）</div>
      <input type="text" class="modal-input" id="addLabel" placeholder="Aa" maxlength="6">
    </div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="confirmAdd()">登録する</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addGroupModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>新規グループを追加</h3>
    <div class="modal-field">
      <div class="modal-label">グループ名</div>
      <input type="text" class="modal-input" id="newGroupNameInput" placeholder="グループ名を入力" maxlength="20">
    </div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="confirmAddGroup()">追加する</button>
    </div>
  </div>
</div>

<script>
// === 元々の仕様・データ構造・ロジックを完全維持 ===
let state = {
  t: { hex: '#1a1a2e', h: 229, s: 44, v: 18, name: '' },
  b: { hex: '#e8f4f8', h: 200, s: 38, v: 97, name: '' }
};

let groups = [
  {
    name: "Main UI",
    items: [
      { key: "💡", swatches: [{ t: "#1a1a2e", b: "#e8f4f8", label: "Aa" }, { t: "#ffffff", b: "#3b7960", label: "OK" }] },
      { key: "🎨", swatches: [{ t: "#3b7960", b: "#f0faf5", label: "G1" }] }
    ]
  },
  {
    name: "Sub Colors",
    items: [
      { key: "🏷️", swatches: [{ t: "#9999aa", b: "#ffffff", label: "M" }] }
    ]
  }
];

let appMode = 'normal'; // normal, lock, edit
let selectedChip = null;
let selectedForSwap = null;
let syncConfig = { token: '', gistId: '' };
let isPolling = false;
let selectedKeyIdx = null;
let dragSrcGroupIdx = null; // ★ グループの並び替え用インデックス

function hexToHsv(hex) {
  let r = parseInt(hex.slice(1,3), 16) / 255;
  let g = parseInt(hex.slice(3,5), 16) / 255;
  let b = parseInt(hex.slice(5,7), 16) / 255;
  let max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, v = max;
  let d = max - min;
  s = max === 0 ? 0 : d / max;
  if (max === min) { h = 0; }
  else {
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
}

function hsvToHex(h, s, v) {
  s /= 100; v /= 100;
  let i = Math.floor(h / 60) % 6;
  let f = (h / 60) - Math.floor(h / 60);
  let p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
  let r, g, b;
  switch (i) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  const toHex = x => Math.round(x * 255).toString(16).padStart(2, '0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

function render() {
  ['t','b'].forEach(k => {
    const c = state[k];
    document.getElementById(k+'Picker').value = c.hex;
    document.getElementById(k+'Hex').value = c.hex;
    document.getElementById(k+'Name').value = c.name;
    document.getElementById(k+'H').value = c.h;
    document.getElementById(k+'S').value = c.s;
    document.getElementById(k+'V').value = c.v;
    document.getElementById(k+'Hval').textContent = c.h + '°';
    document.getElementById(k+'Sval').textContent = c.s + '%';
    document.getElementById(k+'Vval').textContent = c.v + '%';
    document.getElementById(k+'Swatch').style.backgroundColor = c.hex;
  });

  const p = document.getElementById('preview');
  p.style.color = state.t.hex;
  p.style.backgroundColor = state.b.hex;

  document.getElementById('tcDot').style.backgroundColor = state.t.hex;
  document.getElementById('bcDot').style.backgroundColor = state.b.hex;
  document.getElementById('tcCode').textContent = state.t.hex.toUpperCase();
  document.getElementById('bcCode').textContent = state.b.hex.toUpperCase();
  document.getElementById('tcName').textContent = state.t.name ? `(${state.t.name})` : '';
  document.getElementById('bcName').textContent = state.b.name ? `(${state.b.name})` : '';
}

function fromSlider(k) {
  const h = parseInt(document.getElementById(k+'H').value);
  const s = parseInt(document.getElementById(k+'S').value);
  const v = parseInt(document.getElementById(k+'V').value);
  state[k].hex = hsvToHex(h, s, v);
  state[k].h = h; state[k].s = s; state[k].v = v;
  render();
}

function applyHex(k, val) {
  if(!val.startsWith('#')) val = '#' + val;
  if(!/^#[0-9A-Fa-f]{6}$/.test(val)) return;
  state[k].hex = val.toLowerCase();
  Object.assign(state[k], hexToHsv(val));
  render();
}

function swapColors() {
  let tmp = JSON.parse(JSON.stringify(state.t));
  state.t = JSON.parse(JSON.stringify(state.b));
  state.b = tmp;
  render();
}

// === プリセットグループの表示（編集モード時のドラッグ＆削除を完全対応） ===
function renderGroups() {
  const list = document.getElementById('groupsList');
  list.innerHTML = '';
  document.body.className = appMode === 'edit' ? 'mode-edit' : (appMode === 'lock' ? 'mode-lock' : '');

  groups.forEach((g, gIdx) => {
    const block = document.createElement('div');
    block.className = 'group-block';
    
    // ★ グループの並び替え：編集モード時のみ有効化
    block.setAttribute('draggable', appMode === 'edit' ? 'true' : 'false');
    if (appMode === 'edit') {
      block.addEventListener('dragstart', (e) => {
        dragSrcGroupIdx = gIdx;
        block.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      block.addEventListener('dragend', () => {
        block.classList.remove('dragging');
        document.querySelectorAll('.group-block').forEach(b => b.classList.remove('drag-over'));
      });
      block.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (dragSrcGroupIdx !== gIdx) block.classList.add('drag-over');
      });
      block.addEventListener('dragleave', () => block.classList.remove('drag-over'));
      block.addEventListener('drop', (e) => {
        e.preventDefault();
        if (dragSrcGroupIdx !== null && dragSrcGroupIdx !== gIdx) {
          const target = groups[dragSrcGroupIdx];
          groups.splice(dragSrcGroupIdx, 1);
          groups.splice(gIdx, 0, target);
          renderGroups();
          saveToGist();
        }
      });
    }

    const header = document.createElement('div');
    header.className = 'group-header';

    // ★ ハンドル（⠿）
    const handle = document.createElement('span');
    handle.className = 'group-drag-handle';
    handle.textContent = '⠿';
    header.appendChild(handle);

    // ★ グループ名（中央揃え）
    const input = document.createElement('input');
    input.className = 'group-name-input';
    input.value = g.name;
    input.disabled = appMode !== 'edit';
    input.onchange = (e) => { g.name = e.target.value; saveToGist(); };
    header.appendChild(input);

    // ★ グループ削除ボタン（確認ダイアログ仕様）
    const del = document.createElement('button');
    del.className = 'group-del-btn';
    del.textContent = '×';
    del.onclick = () => {
      if (confirm(`「${g.name}」グループを削除しますか？含まれるカラーもすべて消去されます。`)) {
        groups.splice(gIdx, 1);
        renderGroups();
        saveToGist();
      }
    };
    header.appendChild(del);
    block.appendChild(header);

    const rowsWrap = document.createElement('div');
    rowsWrap.className = 'emoji-rows';

    g.items.forEach((item, rIdx) => {
      const row = document.createElement('div');
      row.className = 'emoji-row';

      const keyNode = document.createElement('div');
      keyNode.className = 'emoji-key';
      keyNode.textContent = item.key;
      keyNode.onclick = () => {
        if(appMode !== 'edit') return;
        const n = prompt('新しいキーを入力:', item.key);
        if(n) { item.key = n; renderGroups(); saveToGist(); }
      };
      row.appendChild(keyNode);

      const swatchesNode = document.createElement('div');
      swatchesNode.className = 'emoji-swatches';

      item.swatches.forEach((sw, sIdx) => {
        const chip = document.createElement('div');
        chip.className = 'swatch-chip';
        if(sw.locked) chip.classList.add('locked');

        if (appMode === 'normal') {
          if (selectedChip && selectedChip.g === gIdx && selectedChip.r === rIdx && selectedChip.s === sIdx) {
            chip.classList.add('selected-chip');
          }
          if (selectedForSwap && selectedForSwap.g === gIdx && selectedForSwap.r === rIdx && selectedForSwap.s === sIdx) {
            chip.classList.add('selected-for-swap');
          }
        } else if (appMode === 'lock') {
          chip.classList.add(sw.locked ? 'selected-for-lock-on' : 'selected-for-lock-off');
        }

        chip.onclick = (e) => {
          e.stopPropagation();
          if (appMode === 'lock') {
            sw.locked = !sw.locked;
            renderGroups(); saveToGist(); return;
          }
          if (appMode === 'edit') return;

          if (e.shiftKey) {
            if (!selectedForSwap) {
              selectedForSwap = { g: gIdx, r: rIdx, s: sIdx };
              renderGroups();
            } else {
              const src = groups[selectedForSwap.g].items[selectedForSwap.r].swatches[selectedForSwap.s];
              groups[selectedForSwap.g].items[selectedForSwap.r].swatches[selectedForSwap.s] = sw;
              groups[gIdx].items[rIdx].swatches[sIdx] = src;
              selectedForSwap = null;
              renderGroups(); saveToGist();
            }
            return;
          }

          state.t.hex = sw.t; Object.assign(state.t, hexToHsv(sw.t)); state.t.name = '';
          state.b.hex = sw.b; Object.assign(state.b, hexToHsv(sw.b)); state.b.name = '';
          render();

          selectedChip = { g: gIdx, r: rIdx, s: sIdx };
          renderGroups();
          showToast(`カラーを適用しました (${sw.t} / ${sw.b})`);
        };

        const inner = document.createElement('div');
        inner.className = 'swatch-chip-inner';
        inner.style.color = sw.t;
        inner.style.backgroundColor = sw.b;
        inner.textContent = sw.label || 'Aa';
        chip.appendChild(inner);

        const tt = document.createElement('div');
        tt.className = 'swatch-chip-tooltip';
        tt.textContent = `${sw.t} / ${sw.b}`;
        chip.appendChild(tt);

        const editBtn = document.createElement('button');
        editBtn.className = 'chip-edit-btn';
        editBtn.textContent = '✏️';
        editBtn.onclick = (e) => {
          e.stopPropagation();
          const nLabel = prompt('チップのラベルを変更:', sw.label || 'Aa');
          if (nLabel !== null) {
            sw.label = nLabel;
            const nT = prompt('文字色(HEX):', sw.t); if(nT) sw.t = nT;
            const nB = prompt('背景色(HEX):', sw.b); if(nB) sw.b = nB;
            renderGroups(); saveToGist();
          }
        };
        chip.appendChild(editBtn);
        swatchesNode.appendChild(chip);
      });

      row.appendChild(swatchesNode);

      const reorderNode = document.createElement('div');
      reorderNode.className = 'row-reorder-btns';
      const upBtn = document.createElement('button');
      upBtn.className = 'row-reorder-btn';
      upBtn.textContent = '▲';
      upBtn.disabled = rIdx === 0;
      upBtn.onclick = () => {
        const tmp = g.items[rIdx]; g.items[rIdx] = g.items[rIdx-1]; g.items[rIdx-1] = tmp;
        renderGroups(); saveToGist();
      };
      const downBtn = document.createElement('button');
      downBtn.className = 'row-reorder-btn';
      downBtn.textContent = '▼';
      downBtn.disabled = rIdx === g.items.length - 1;
      downBtn.onclick = () => {
        const tmp = g.items[rIdx]; g.items[rIdx] = g.items[rIdx+1]; g.items[rIdx+1] = tmp;
        renderGroups(); saveToGist();
      };
      reorderNode.appendChild(upBtn); reorderNode.appendChild(downBtn);
      row.appendChild(reorderNode);

      rowsWrap.appendChild(row);
    });

    if (appMode === 'edit') {
      const addRowDiv = document.createElement('div');
      addRowDiv.className = 'group-add-row';
      const btn = document.createElement('button');
      btn.className = 'group-add-preset';
      btn.textContent = '＋ 行(キー)を追加';
      btn.onclick = () => {
        const k = prompt('新しく追加する行のキーを入力 (例: 📝):', '✨');
        if(k) { g.items.push({ key: k, swatches: [] }); renderGroups(); saveToGist(); }
      };
      addRowDiv.appendChild(btn);
      rowsWrap.appendChild(addRowDiv);
    }

    block.appendChild(rowsWrap);
    list.appendChild(block);
  });
}

function toggleLockMode() {
  if(appMode === 'lock') appMode = 'normal';
  else { appMode = 'lock'; selectedChip = null; selectedForSwap = null; }
  document.getElementById('lockModeBtn').className = appMode === 'lock' ? 'icon-btn active-lock' : 'icon-btn';
  document.getElementById('editModeBtn').className = 'icon-btn';
  renderGroups();
}

function toggleEditMode() {
  if(appMode === 'edit') appMode = 'normal';
  else { appMode = 'edit'; selectedChip = null; selectedForSwap = null; }
  document.getElementById('editModeBtn').className = appMode === 'edit' ? 'icon-btn active' : 'icon-btn';
  document.getElementById('lockModeBtn').className = 'icon-btn';
  renderGroups();
}

// === 元々のモーダル開閉・連携ロジックを完全維持 ===
function openAddModal() {
  document.getElementById('addModal').style.display = 'flex';
  document.getElementById('modalDotT').style.backgroundColor = state.t.hex;
  document.getElementById('modalDotB').style.backgroundColor = state.b.hex;
  document.getElementById('modalInfo').textContent = `TEXT: ${state.t.hex.toUpperCase()}\nBG: ${state.b.hex.toUpperCase()}`;
  
  const gSel = document.getElementById('modalGroup');
  gSel.innerHTML = '';
  groups.forEach((g,i) => {
    const o = document.createElement('option'); o.value = i; o.textContent = g.name;
    gSel.appendChild(o);
  });
  onModalGroupChange();
  document.getElementById('addLabel').value = '';
}

function onModalGroupChange() {
  const gIdx = document.getElementById('modalGroup').value;
  const area = document.getElementById('emojiKeySelect');
  area.innerHTML = '';
  selectedKeyIdx = null;

  if(!groups[gIdx]) return;
  groups[gIdx].items.forEach((item, idx) => {
    const b = document.createElement('button'); b.className = 'emoji-key-btn'; b.textContent = item.key;
    b.onclick = () => {
      document.querySelectorAll('.emoji-key-btn').forEach(btn=>btn.classList.remove('selected'));
      b.classList.add('selected');
      selectedKeyIdx = idx;
    };
    area.appendChild(b);
  });
}

function closeModal() {
  document.getElementById('addModal').style.display = 'none';
  document.getElementById('addGroupModal').style.display = 'none';
}

function confirmAdd() {
  const gIdx = document.getElementById('modalGroup').value;
  const label = document.getElementById('addLabel').value || 'Aa';
  if (selectedKeyIdx === null) return alert('行を選択してください');
  groups[gIdx].items[selectedKeyIdx].swatches.push({ t: state.t.hex, b: state.b.hex, label });
  renderGroups();
  saveToGist();
  closeModal();
}

function openAddGroupModal() {
  document.getElementById('addGroupModal').style.display = 'flex';
  document.getElementById('newGroupNameInput').value = '';
}

function confirmAddGroup() {
  const name = document.getElementById('newGroupNameInput').value.trim() || '新規グループ';
  groups.push({ name, items: [] });
  closeModal();
  renderGroups();
  saveToGist();
}

function showToast(msg) {
  const t = document.getElementById('copyToast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

function copyText(val) {
  const dummy = document.createElement('textarea'); dummy.value = val; document.body.appendChild(dummy);
  dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy);
}

function copyAndShowHex(k){ const h = document.getElementById(k==='t'?'tcCode':'bcCode').textContent; copyText(h); showToast(h+' をコピーしました'); }
function copyHex(k){ const h = document.getElementById(k+'Hex').value; copyText(h); showToast(h+' をコピーしました'); }

function toggleSyncSetupPanel() {
  const s = document.getElementById('syncSetup');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

function loadSyncConfig() {
  const saved = localStorage.getItem('cp_sync');
  if (saved) {
    syncConfig = JSON.parse(saved);
    document.getElementById('gistTokenInput').value = syncConfig.token;
    document.getElementById('gistIdInput').value = syncConfig.gistId;
  }
  const localGroups = localStorage.getItem('cp_groups');
  if (localGroups) { groups = JSON.parse(localGroups); }
}

function updateSyncBadge(status, msg) {
  const b = document.getElementById('syncBadge');
  const l = document.getElementById('syncLabel');
  b.className = 'sync-badge ' + status; l.textContent = msg;
}

function updateSyncShareUrl() {
  const row = document.getElementById('syncShareUrlRow');
  if (syncConfig.gistId) {
    row.style.display = 'flex';
    document.getElementById('syncShareInput').value = location.origin + location.pathname + '?gist=' + syncConfig.gistId;
  } else { row.style.display = 'none'; }
}

function copySyncUrl() { copyText(document.getElementById('syncShareInput').value); showToast('共有URLをコピーしました'); }

async function setupSync() {
  const token = document.getElementById('gistTokenInput').value.trim();
  let gistId = document.getElementById('gistIdInput').value.trim();
  if (!token) return alert('GitHub Tokenを入力してください');

  updateSyncBadge('syncing', '接続中...');
  try {
    if (!gistId) {
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          description: "Color Preview Sync Data", public: false,
          files: { "color_preview_data.json": { content: JSON.stringify(groups, null, 2) } }
        })
      });
      if (!res.ok) throw new Error('Gistの作成に失敗しました');
      const data = await res.json(); gistId = data.id;
      document.getElementById('gistIdInput').value = gistId;
    } else {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } });
      if (res.ok) {
        const data = await res.json();
        if (data.files["color_preview_data.json"]) {
          groups = JSON.parse(data.files["color_preview_data.json"].content);
        }
      }
    }
    syncConfig = { token, gistId };
    localStorage.setItem('cp_sync', JSON.stringify(syncConfig));
    localStorage.setItem('cp_groups', JSON.stringify(groups));
    updateSyncBadge('synced', '同期中'); updateSyncShareUrl(); renderGroups(); startPolling();
  } catch(e) { updateSyncBadge('error', '同期エラー'); alert(e.message); }
}

function clearSync() {
  syncConfig = { token: '', gistId: '' }; localStorage.removeItem('cp_sync');
  document.getElementById('gistTokenInput').value = ''; document.getElementById('gistIdInput').value = '';
  updateSyncBadge('error', '未接続'); updateSyncShareUrl();
}

async function saveToGist() {
  localStorage.setItem('cp_groups', JSON.stringify(groups));
  if (!syncConfig.token || !syncConfig.gistId) return;
  try {
    await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${syncConfig.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { "color_preview_data.json": { content: JSON.stringify(groups, null, 2) } } })
    });
  } catch(e) { console.error('Gist自動保存エラー:', e); }
}

function startPolling() {
  if (isPolling || !syncConfig.token || !syncConfig.gistId) return;
  isPolling = true;
  setInterval(async () => {
    try {
      const res = await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, { headers: { 'Authorization': `token ${syncConfig.token}` } });
      if (res.ok) {
        const data = await res.json();
        if (data.files["color_preview_data.json"]) {
          const remote = JSON.parse(data.files["color_preview_data.json"].content);
          if (JSON.stringify(remote) !== JSON.stringify(groups)) {
            groups = remote; localStorage.setItem('cp_groups', JSON.stringify(groups)); renderGroups();
          }
        }
      }
    } catch(e) { console.error('同期エラー:', e); }
  }, 10000);
}

// 初期化
(function init() {
  loadSyncConfig();
  const params = new URLSearchParams(location.search);
  const urlGistId = params.get('gist');
  if (urlGistId) { syncConfig.gistId = urlGistId; document.getElementById('gistIdInput').value = urlGistId; }
  if (syncConfig.token && syncConfig.gistId) { startPolling(); updateSyncShareUrl(); }
  render();
  renderGroups();
})();

['tH','tS','tV'].forEach(id=>document.getElementById(id).oninput=()=>fromSlider('t'));
['bH','bS','bV'].forEach(id=>document.getElementById(id).oninput=()=>fromSlider('b'));
document.getElementById('tPicker').oninput=e=>applyHex('t',e.target.value);
document.getElementById('bPicker').oninput=e=>applyHex('b',e.target.value);
document.getElementById('tHex').oninput=e=>applyHex('t',e.target.value);
document.getElementById('bHex').oninput=e=>applyHex('b',e.target.value);
document.getElementById('tName').oninput=render; document.getElementById('bName').oninput=render;

document.addEventListener('click', () => {
  if (appMode === 'normal' && selectedChip) { selectedChip = null; renderGroups(); }
});
</script>
